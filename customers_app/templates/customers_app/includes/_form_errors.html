{% load static %}

{% if form.errors %}
    <div>
        {% for field in form %}
            {% for error in field.errors %}
                <div class="alert alert-danger">
                    <strong>{{ field.label }}</strong>: {{ error|escape }}
                </div>
            {% endfor %}
        {% endfor %}
        {% for error in form.non_field_errors %}
            <div class="alert alert-danger">
                <strong>{{ field.label }}</strong>: {{ error|escape }}
            </div>
        {% endfor %}
    </div>
{% endif %}
