{% extends 'customers_app/main.html' %}
{% load static %}

{% block custom_css %}
    <style>
        /* Базовые стили */
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-layout {
            display: flex;
            flex-direction: row;
            gap: 20px;
            padding: 20px;
            align-items: flex-start;
            justify-content: center;
            flex-wrap: wrap;
        }

        #tetris-container {
            position: relative;
            border: 4px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background: #000;
        }

        canvas {
            display: block;
            background-color: #000;
        }

        .side-panel {
            min-width: 200px;
            background: #252525;
            padding: 20px;
            border-radius: 10px;
        }

        #mobile-controls {
            display: none;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
        }

        #mobile-controls button {
            background: #444;
            border: none;
            color: white;
            padding: 20px;
            font-size: 1.5rem;
            border-radius: 10px;
            touch-action: manipulation;
        }

        #mobile-controls button:active {
            background: #666;
        }

        .drop-btn { grid-column: 2; }

        @media (max-width: 768px) {
            #game-layout { flex-direction: column; align-items: center; }
            #mobile-controls { display: grid; }
        }

        .stat-val { color: #0b5ed7; font-weight: bold; }
        .best-val { color: #d70b0b; font-weight: bold; }
    </style>
{% endblock %}

{% block content %}
    <div id="game-layout">
        <div class="side-panel">
            <h3>Тетрис</h3>
            <hr>
            <p>Счет: <span id="score" class="stat-val">0</span></p>
            <p>Уровень: <span id="level" class="stat-val">1</span></p>
            <p>Линии: <span id="lines" class="stat-val">0</span></p>
            <hr>
            <h5>Рекорды:</h5>
            <p>Топ: <span id="overall-winner" class="best-val">...</span></p>
            <p>Твой лучший: <span id="user-best" class="best-val">...</span></p>
        </div>

        <div id="tetris-container">
            <canvas id="tetris"></canvas>
        </div>

        <div id="mobile-controls">
            <button id="rotate-btn">↻</button>
            <button id="up-btn">↑</button> <button id="empty"></button>
            <button id="left-btn">←</button>
            <button id="down-btn">↓</button>
            <button id="right-btn">→</button>
        </div>
    </div>

    {% csrf_token %}
{% endblock %}

{% block custom_script %}
<script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    const scale = 30; // Размер одного блока в пикселях

    canvas.width = 10 * scale;
    canvas.height = 20 * scale;

    // Цвета фигур (классическая палитра)
    const colors = [
        null,
        '#FF0D72', // T
        '#0DC2FF', // I
        '#0DFF72', // S
        '#F538FF', // Z
        '#FF8E0D', // L
        '#FFE138', // J
        '#3877FF', // O
    ];

    function createPiece(type) {
        if (type === 'I') return [[0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0], [0, 2, 0, 0]];
        if (type === 'L') return [[0, 5, 0], [0, 5, 0], [0, 5, 5]];
        if (type === 'J') return [[0, 6, 0], [0, 6, 0], [6, 6, 0]];
        if (type === 'O') return [[7, 7], [7, 7]];
        if (type === 'Z') return [[4, 4, 0], [0, 4, 4], [0, 0, 0]];
        if (type === 'S') return [[0, 3, 3], [3, 3, 0], [0, 0, 0]];
        if (type === 'T') return [[0, 1, 0], [1, 1, 1], [0, 0, 0]];
    }

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function draw() {
        // Очистка фона
        context.fillStyle = '#000';
        context.fillRect(0, 0, canvas.width, canvas.height);

        drawMatrix(arena, {x: 0, y: 0});
        drawMatrix(player.matrix, player.pos);
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    // Рисуем основной цвет блока
                    context.fillStyle = colors[value];
                    context.fillRect((x + offset.x) * scale, (y + offset.y) * scale, scale, scale);

                    // Блик/обводка для красоты
                    context.lineWidth = 2;
                    context.strokeStyle = 'rgba(0,0,0,0.3)';
                    context.strokeRect((x + offset.x) * scale, (y + offset.y) * scale, scale, scale);
                }
            });
        });
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    arena[y + player.pos.y][x + player.pos.x] = value;
                }
            });
        });
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 &&
                   (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                    return true;
                }
            }
        }
        return false;
    }

    function arenaSweep() {
        let rowCount = 1;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;

            score += rowCount * 10;
            rowCount *= 2;
            linesCleared++;
        }
        updateScore();
    }

    function rotate(matrix, dir) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) {
                [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
            }
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
            updateScore();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) {
            player.pos.x -= dir;
        }
    }

    function playerRotate(dir) {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix, dir);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -dir);
                player.pos.x = pos;
                return;
            }
        }
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);

        if (collide(arena, player)) {
            arena.forEach(row => row.fill(0));
            saveStats(); // Отправка на бэкенд при проигрыше
            score = 0;
            linesCleared = 0;
            updateScore();
        }
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function update(time = 0) {
        const deltaTime = time - lastTime;
        lastTime = time;

        dropCounter += deltaTime;
        if (dropCounter > (dropInterval - (level * 50))) {
            playerDrop();
        }

        draw();
        requestAnimationFrame(update);
    }

    function updateScore() {
        document.getElementById('score').innerText = score;
        document.getElementById('level').innerText = Math.floor(linesCleared / 10) + 1;
        document.getElementById('lines').innerText = linesCleared;
        level = Math.floor(linesCleared / 10) + 1;
    }

    const arena = createMatrix(10, 20);
    const player = {
        pos: {x: 0, y: 0},
        matrix: null,
    };

    let score = 0;
    let level = 1;
    let linesCleared = 0;

    // Управление клавишами
    document.addEventListener('keydown', event => {
        if (event.keyCode === 37) playerMove(-1);
        else if (event.keyCode === 39) playerMove(1);
        else if (event.keyCode === 40) playerDrop();
        else if (event.keyCode === 38) playerRotate(1); // Стрелка вверх - поворот
        else if (event.keyCode === 32) { // Пробел - быстрый сброс
            while(!collide(arena, player)) { player.pos.y++; }
            player.pos.y--;
            playerDrop();
        }
    });

    // Мобильное управление
    document.getElementById('left-btn').onclick = () => playerMove(-1);
    document.getElementById('right-btn').onclick = () => playerMove(1);
    document.getElementById('down-btn').onclick = () => playerDrop();
    document.getElementById('rotate-btn').onclick = () => playerRotate(1);
    document.getElementById('up-btn').onclick = () => {
        while(!collide(arena, player)) { player.pos.y++; }
        player.pos.y--;
        playerDrop();
    };

    // AJAX функции для Django
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }

    function saveStats() {
        fetch('{% url "customers_app:save_stats" %}', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken'),
            },
            body: JSON.stringify({
                score: score,
                level: level,
                lines_cleared: linesCleared,
            }),
        }).then(() => loadLeaderboard());
    }

    function loadLeaderboard() {
        fetch('{% url "customers_app:get_leaderboard" %}')
            .then(response => response.json())
            .then(data => {
                const winner = data.overall_winner;
                document.getElementById('overall-winner').innerText = winner.username ? `${winner.username}: ${winner.score}` : 'Нет данных';
                document.getElementById('user-best').innerText = data.user_best.score || 0;
            });
    }

    // Инициализация
    playerReset();
    updateScore();
    update();
    loadLeaderboard();

</script>
{% endblock %}
