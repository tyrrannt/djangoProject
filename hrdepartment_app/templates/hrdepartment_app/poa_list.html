{% extends 'customers_app/main.html' %}
{% load static %}

{% block title %}
    Список доверенностей
{% endblock %}

{% block content %}
    <div class="row">
        <div class="col">
            <div class="card card-modern">
                <div class="card-body">
                    <div class="row align-items-center mb-3">
                        <div class="col-12 col-lg-auto mb-3 mb-lg-0">
                            <a href="{% url 'hrdepartment_app:poa_add' %}" class="btn btn-outline-primary py-2">
                                <i class='bx bx-list-plus me-2'></i> Добавить доверенность
                            </a>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <style>
                            thead input {
                                width: 100%;
                                padding: 3px;
                                box-sizing: border-box;
                                border-radius: 10px;
                                border-color: #ff7300;
                                color: #003994;
                            }
                        </style>
                        <table class="table table-ecommerce-simple table-striped mb-0" id="datatable-ecommerce-list"
                               style="min-width: 750px;">
                            <thead>
                            <tr>
                                <th>Номер</th>
                                <th>Дата выдачи</th>
                                <th>Окончание</th>
                                <th>Поверенный</th>
                                <th>Организация</th>
                                <th>Статус</th>
                            </tr>
                            </thead>

                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
{% block custom_script %}
    <script>
        $(document).ready(function () {
            $('#datatable-ecommerce-list thead th').each(function () {
                var title = $(this).text();
                $(this).html('<input type="text" placeholder="' + title + '" class="fs-6" />');
            });
            var table = $('#datatable-ecommerce-list').DataTable({
                "initComplete": function () {
                    // Apply the search
                    this.api()
                        .columns()
                        .every(function () {
                            var that = this;
                            $('input', this.header()).on('keyup change clear', function () {
                                if (that.search() !== this.value) {
                                    that.search(this.value).draw();
                                }
                            });
                        });
                },
                "scrollX": true,
                "sDom": 'T<"clear">lrtip',
                "ajax": "{% url 'hrdepartment_app:poa_list' %}",
                "language": {
                    "url": "{% static 'admin_templates/vendor/datatables/media/Russian.json' %}"
                },
                "fnRowCallback": function (nRow, aData, iDisplayIndex, iDisplayIndexFull) {
                    var id = aData['pk'];
                    $(nRow).attr("href", id + '/');
                    $(nRow).css('cursor', 'pointer');
                    $(nRow).click(function () {
                        window.location = $(this).attr('href');
                        return false;
                    });
                },
                "columns": [

                    {"data": "number"},
                    {"data": "issue_date"},
                    {"data": "expiry_date"},
                    {"data": "grantee_name_user"},
                    {"data": "organization"},
                    {"data": "is_received"},

                ],
            });
        });
    </script>
{% endblock %}
