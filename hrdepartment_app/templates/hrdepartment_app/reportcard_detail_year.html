{% extends 'customers_app/main.html' %}
{% load static %}
{% load custom %}

{% block title %}
    {{ title }}
{% endblock %}

{% block content %}
    <style>
        .table-ecommerce-simple {
            overflow-x: auto;
            position: relative;
        }

        .table-ecommerce-simple th {
            position: -webkit-sticky;
            position: sticky;
            top: -3px;
        / / при нуле в chrome остаётся странный зазор z-index: 2;
        }
    </style>

    <!-- start: page -->
    <div class="row">
        <div class="col">
            <!-- Форма фильтрации -->
            <div class="card mb-4">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Фильтры</h5>
                </div>
                <div class="card-body">
                    <form method="get" class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Год:</label>
                            <select name="report_year" class="form-select" id="report-year-select">
                                {% for year in years %}
                                    <option value="{{ year }}"
                                            {% if selected_year == year|stringformat:"s" %}selected{% endif %}>
                                        {{ year }}
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-12">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-funnel"></i> Применить фильтры
                            </button>
                            <a href="{% url 'hrdepartment_app:reportcard_detail_year' %}" class="btn btn-secondary">
                                <i class="bi bi-arrow-clockwise"></i> Сбросить
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card card-modern">
                <div class="card-body">
                    <div class="dt-buttons btn-group">
                        <!-- Кнопка экспорта -->
                        <a id="export-excel-btn"
                           class="btn btn-secondary buttons-excel buttons-html5"
                           href="{% url 'hrdepartment_app:reportcard_detail_year_xls' year=years.0 %}">
                            <span>Excel</span>
                        </a>
                    </div>
                    {{ table_error }}
                    <div id="id_tables" class="table-responsive">
                        {{ table | safe }}
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- end: page -->
{% endblock %}

{% block custom_script %}
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const select = document.getElementById('report-year-select');
            const btn = document.getElementById('export-excel-btn');
            const baseHref = btn.href;

            select.addEventListener('change', function () {
                // Заменяем год в URL
                const newHref = baseHref.replace(/\/\d+\//, '/' + this.value + '/');
                btn.href = newHref;
            });
        });
    </script>
{% endblock %}
