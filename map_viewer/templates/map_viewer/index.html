<!DOCTYPE html>
<html>
<head>
    <title>Карта | {{ user.username }}</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        #map { height: 90vh; width: 100%; background: #ccd; }
        body { margin: 0; padding: 0; }
        .header { padding: 10px; background: #fff; font-family: sans-serif; border-bottom: 1px solid #ccc; }
    </style>
</head>
<body>

<div class="header">
    Пользователь: {{ user.username }}
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // 1. ИНИЦИАЛИЗАЦИЯ КАРТЫ (обязательно)
    var map = L.map('map', {
        center: [50.1109, 8.6821], // Франкфурт
        zoom: 8,
        minZoom: 5,
        maxZoom: 12
    });

    // 2. (опционально) базовый слой, чтобы не было пустоты
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: 'OSM'
    }).addTo(map);

    // 3. ТВОИ ТАЙЛЫ
    {% if maps %}
        {% for m in maps %}
            var layer_{{ m.id }} = L.tileLayer('/map/tile/{{ m.id }}/{z}/{x}/{y}/', {
                maxZoom: 12,
                minZoom: 5,
                tms: false, // важно! у тебя инверсия уже на backend
                noWrap: true
            });

            layer_{{ m.id }}.addTo(map);
        {% endfor %}
    {% endif %}

    // 4. ОТЛАДКА
    map.on('moveend', function() {
        console.log("Центр:", map.getCenter());
        console.log("Zoom:", map.getZoom());
    });
</script>

</body>
</html>
