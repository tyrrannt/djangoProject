{% extends 'customers_app/main.html' %}
{% load static %}
{% load custom %}

{% block title %}
    {{ title }}
{% endblock %}

{% block custom_css %}
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/index.js"></script>
    <style>
        .message {
            padding: 8px 15px;
            margin-bottom: 8px;
            border-radius: 15px;
            background-color: #e9ecef;
            display: inline-block;
            max-width: 85%;
            word-break: break-word;
            font-size: 0.95rem;
        }

        .notification {
            color: #6c757d;
            font-style: italic;
            margin-bottom: 10px;
            font-size: 0.85rem;
            text-align: center;
        }

        #video-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        #remote-videos-container {
            display: contents;
        }

        video {
            width: 100%;
            aspect-ratio: 16/9;
            background-color: #212529;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .local-video {
            border: 3px solid #0d6efd;
        }

        .remote-video {
            border: 3px solid #198754;
        }

        .video-wrapper {
            position: relative;
        }

        .video-wrapper label {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.6);
            color: #fff;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 11px;
            z-index: 5;
            pointer-events: none;
        }

        #chat-log::-webkit-scrollbar {
            width: 6px;
        }
        #chat-log::-webkit-scrollbar-thumb {
            background-color: #dee2e6;
            border-radius: 10px;
        }

        .nav-tabs .nav-link {
            border: none;
            color: #6c757d;
            font-weight: 500;
        }

        .nav-tabs .nav-link.active {
            color: #0d6efd;
            border-bottom: 3px solid #0d6efd;
            background: transparent;
        }

        @media (max-width: 768px) {
            #video-container {
                grid-template-columns: repeat(auto-fit, minmax(min(100%, 160px), 1fr));
                gap: 8px;
            }
            .message {
                max-width: 90%;
                font-size: 0.9rem;
            }
            #chat-log {
                height: calc(100vh - 350px) !important;
            }
        }
        
        emoji-picker {
            width: 100%;
            max-width: 100%;
            height: 300px;
        }
    </style>
{% endblock %}

{% block content %}
    <div class="container-fluid p-0 p-md-3">
        <div class="card shadow-sm border-0 overflow-hidden mx-auto" style="max-width: 1000px;">
            <div class="card-header bg-white border-bottom-0 p-0">
                <div class="d-flex align-items-center pr-3">
                    <ul class="nav nav-tabs nav-fill flex-grow-1" id="chatTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active py-3" id="video-tab" data-bs-toggle="tab" data-bs-target="#video-pane" type="button" role="tab" aria-controls="video-pane" aria-selected="true">
                                <i class="fas fa-video me-2"></i>Видео
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link py-3" id="chat-tab" data-bs-toggle="tab" data-bs-target="#chat-pane" type="button" role="tab" aria-controls="chat-pane" aria-selected="false">
                                <i class="fas fa-comments me-2"></i>Чат
                            </button>
                        </li>
                    </ul>
                    <button class="btn btn-light border-start rounded-0 py-3 px-4" data-bs-toggle="modal" data-bs-target="#inviteModal" title="Пригласить участников">
                        <i class="fas fa-user-plus text-primary"></i>
                    </button>
                </div>
            </div>
            
            <div class="card-body p-0">
                <div class="tab-content" id="chatTabsContent">
                    <!-- Видео Панель -->
                    <div class="tab-pane fade show active p-3" id="video-pane" role="tabpanel" aria-labelledby="video-tab">
                        <div id="video-container">
                            <div class="video-wrapper">
                                <label>Вы</label>
                                <video id="localVideo" class="local-video" autoplay playsinline muted></video>
                            </div>
                            <div id="remote-videos-container"></div>
                        </div>

                        <div class="d-flex justify-content-center gap-2 mb-3">
                            <button id="start-video" class="btn btn-outline-success rounded-pill px-4" title="Включить видео"><i class="fas fa-video"></i></button>
                            <button id="start-audio" class="btn btn-outline-info rounded-pill px-4 text-dark" title="Включить аудио"><i class="fas fa-microphone"></i></button>
                            <button id="stop-call" class="btn btn-danger rounded-pill px-4" disabled title="Завершить вызов"><i class="fas fa-phone-slash"></i></button>
                        </div>
                    </div>

                    <!-- Чат Панель -->
                    <div class="tab-pane fade p-3" id="chat-pane" role="tabpanel" aria-labelledby="chat-tab">
                        <div id="chat-log" class="border rounded p-3 mb-3 bg-light shadow-sm"
                             style="height: 400px; overflow-y: auto;"></div>

                        <div class="input-group mb-3 shadow-sm">
                            <input id="chat-message-input" type="text" class="form-control border-end-0" placeholder="Напишите сообщение...">
                            <button id="chat-message-submit" class="btn btn-primary px-4" type="button">
                                <i class="fas fa-paper-plane"></i>
                            </button>
                        </div>

                        <div class="collapse" id="emojiCollapse">
                            <div class="d-flex justify-content-center mb-3">
                                <emoji-picker id="emoji-picker" class="light shadow-sm"></emoji-picker>
                            </div>
                        </div>
                        <button class="btn btn-sm btn-outline-secondary w-100 mb-2" type="button" data-bs-toggle="collapse" data-bs-target="#emojiCollapse">
                            <i class="far fa-smile"></i> Смайлы
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно приглашения -->
    <div class="modal fade" id="inviteModal" tabindex="-1" aria-labelledby="inviteModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="inviteModalLabel">Пригласить участников</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Выберите сотрудников:</label>
                        <select id="invite-users-select" class="form-control select2" multiple="multiple" style="width: 100%;">
                            {% for user in all_users %}
                                <option value="{{ user.pk }}">{{ user.get_full_name|default:user.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                    <button type="button" id="send-invites-btn" class="btn btn-primary">Отправить приглашения</button>
                </div>
            </div>
        </div>
    </div>


    <script type="module">
        import ColorHash from '{% static 'admin_templates/vendor/color-hash/dist/esm.js' %}';

        const roomName = "{{ room_name }}";
        const currentUserId = parseInt("{{ request.user.pk }}");
        const currentUsername = "{{ request.user.username }}";
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        const chatSocket = new WebSocket(
            protocol + window.location.host + '/ws/chat/' + roomName + '/'
        );

        const colorHash = new ColorHash();
        const localVideo = document.getElementById('localVideo');
        const remoteVideosContainer = document.getElementById('remote-videos-container');
        const startVideoButton = document.getElementById('start-video');
        const startAudioButton = document.getElementById('start-audio');
        const stopCallButton = document.getElementById('stop-call');

        let localStream;
        let peerConnections = {}; // userId -> { pc, makingOffer, ignoreOffer, polite }
        const configuration = {'iceServers': [{'urls': 'stun:stun.l.google.com:19302'}]};

        chatSocket.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.type === 'chat_message' || !data.type) {
                const messageLog = document.querySelector('#chat-log');
                const messageDiv = document.createElement('div');
                messageDiv.className = 'mb-2';
                
                const timeSpan = document.createElement('small');
                timeSpan.className = 'text-muted me-2';
                timeSpan.textContent = data.timestamp ? `[${data.timestamp}]` : `[${new Date().toLocaleTimeString()}]`;

                const userSpan = document.createElement('strong');
                if (data.username === 'Система') {
                    userSpan.className = 'notification';
                } else {
                    userSpan.style.color = colorHash.hex(data.username);
                }
                userSpan.textContent = data.username + ': ';

                const textSpan = document.createElement('span');
                textSpan.className = 'message';
                textSpan.textContent = data.message;

                messageDiv.appendChild(timeSpan);
                messageDiv.appendChild(userSpan);
                messageDiv.appendChild(textSpan);
                
                messageLog.appendChild(messageDiv);
                messageLog.scrollTop = messageLog.scrollHeight;
            } else if (data.type === 'signal') {
                console.log(`DEBUG: Signal from ${data.username} (ID: ${data.user_id})`, data.signal);
                handleSignal(data.user_id, data.username, data.signal);
            }
        };

        async function startCall(video) {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({video: video, audio: true});
                localVideo.srcObject = localStream;
                startVideoButton.disabled = true;
                startAudioButton.disabled = true;
                stopCallButton.disabled = false;

                // Добавляем треки во все существующие соединения
                for (let userId in peerConnections) {
                    const pc = peerConnections[userId].pc;
                    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
                }

                // Оповещаем всех о готовности
                chatSocket.send(JSON.stringify({
                    'type': 'signal',
                    'signal': {'type': 'new-peer'}
                }));

            } catch (e) {
                console.error('Error accessing media devices.', e);
                alert('Не удалось получить доступ к камере или микрофону');
            }
        }

        function createPeerConnection(remoteUserId, remoteUsername) {
            const rId = parseInt(remoteUserId);
            if (peerConnections[rId]) return peerConnections[rId];

            console.log(`Creating PeerConnection for ${remoteUsername} (ID: ${rId})`);
            const pc = new RTCPeerConnection(configuration);
            const polite = currentUserId < rId;

            const pcData = {
                pc: pc,
                makingOffer: false,
                ignoreOffer: false,
                polite: polite
            };

            pc.onicecandidate = event => {
                if (event.candidate) {
                    chatSocket.send(JSON.stringify({
                        'type': 'signal',
                        'signal': {'candidate': event.candidate},
                        'target_id': rId
                    }));
                }
            };

            pc.ontrack = event => {
                console.log(`Received track ${event.track.kind} from ${remoteUsername}`);
                let remoteVideo = document.getElementById(`video-${rId}`);
                if (!remoteVideo) {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'video-wrapper';
                    const label = document.createElement('label');
                    label.textContent = remoteUsername;
                    remoteVideo = document.createElement('video');
                    remoteVideo.id = `video-${rId}`;
                    remoteVideo.className = 'remote-video';
                    remoteVideo.autoplay = true;
                    remoteVideo.playsinline = true;
                    wrapper.appendChild(label);
                    wrapper.appendChild(remoteVideo);
                    remoteVideosContainer.appendChild(wrapper);
                }
                
                if (remoteVideo.srcObject !== event.streams[0]) {
                    remoteVideo.srcObject = event.streams[0];
                }
            };

            pc.onnegotiationneeded = async () => {
                try {
                    pcData.makingOffer = true;
                    await pc.setLocalDescription();
                    chatSocket.send(JSON.stringify({
                        'type': 'signal',
                        'signal': {'sdp': pc.localDescription},
                        'target_id': rId
                    }));
                } catch (err) {
                    console.error(`Negotiation error with ${remoteUsername}:`, err);
                } finally {
                    pcData.makingOffer = false;
                }
            };

            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }

            peerConnections[rId] = pcData;
            return pcData;
        }

        async function handleSignal(fromUserId, fromUsername, signal) {
            const fId = parseInt(fromUserId);
            if (fId === currentUserId) return; // Игнорируем свои же сигналы

            try {
                let pcData = peerConnections[fId];

                if (signal.type === 'new-peer') {
                    console.log(`New peer event from ${fromUsername}`);
                    if (!pcData) pcData = createPeerConnection(fId, fromUsername);
                    return;
                }

                if (signal.sdp) {
                    if (!pcData) pcData = createPeerConnection(fId, fromUsername);
                    const pc = pcData.pc;

                    const offerCollision = (signal.sdp.type === "offer") &&
                        (pcData.makingOffer || pc.signalingState !== "stable");

                    pcData.ignoreOffer = !pcData.polite && offerCollision;
                    if (pcData.ignoreOffer) {
                        console.log(`Collision: ignoring offer from ${fromUsername}`);
                        return;
                    }

                    await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
                    if (signal.sdp.type === "offer") {
                        await pc.setLocalDescription();
                        chatSocket.send(JSON.stringify({
                            'type': 'signal',
                            'signal': {'sdp': pc.localDescription},
                            'target_id': fId
                        }));
                    }
                } else if (signal.candidate) {
                    if (!pcData) pcData = createPeerConnection(fId, fromUsername);
                    try {
                        await pcData.pc.addIceCandidate(new RTCIceCandidate(signal.candidate));
                    } catch (err) {
                        if (!pcData.ignoreOffer) throw err;
                    }
                } else if (signal.type === 'bye') {
                    if (pcData) {
                        pcData.pc.close();
                        delete peerConnections[fId];
                        const video = document.getElementById(`video-${fId}`);
                        if (video) video.parentElement.remove();
                    }
                }
            } catch (err) {
                console.error(`Signal handling error from ${fromUsername}:`, err);
            }
        }

        startVideoButton.onclick = () => startCall(true);
        startAudioButton.onclick = () => startCall(false);

        stopCallButton.onclick = () => {
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localVideo.srcObject = null;
            }
            chatSocket.send(JSON.stringify({
                'type': 'signal',
                'signal': {'type': 'bye'}
            }));
            for (let user in peerConnections) {
                peerConnections[user].pc.close();
                const video = document.getElementById(`video-${user}`);
                if (video) video.parentElement.remove();
            }
            peerConnections = {};
            startVideoButton.disabled = false;
            startAudioButton.disabled = false;
            stopCallButton.disabled = true;
        };

        chatSocket.onclose = function (event) {
            console.error('Chat socket closed unexpectedly');
        };

        document.querySelector('#chat-message-input').focus();
        document.querySelector('#chat-message-input').onkeyup = function (e) {
            if (e.keyCode === 13) {  // Enter key
                document.querySelector('#chat-message-submit').click();
            }
        };

        document.querySelector('#chat-message-submit').onclick = function (e) {
            const messageInputDom = document.querySelector('#chat-message-input');
            const message = messageInputDom.value.trim();
            if (message !== "") {
                chatSocket.send(JSON.stringify({
                    'type': 'chat_message',
                    'message': message
                }));
                messageInputDom.value = '';
            }
        };

        const emojiPicker = document.querySelector('#emoji-picker');
        emojiPicker.addEventListener('emoji-click', event => {
            const messageInputDom = document.querySelector('#chat-message-input');
            messageInputDom.value += event.detail.unicode;
        });
    </script>
{% endblock %}

{% block custom_script %}
    <script>
        $(document).ready(function() {
            // Инициализация Select2 при открытии модального окна
            $('#inviteModal').on('shown.bs.modal', function () {
                $('#invite-users-select').select2({
                    dropdownParent: $('#inviteModal'),
                    placeholder: "Поиск сотрудников...",
                    allowClear: true,
                    theme: 'bootstrap-5'
                });
            });

            $('#send-invites-btn').click(function() {
                const selectedUsers = $('#invite-users-select').val();
                if (!selectedUsers || selectedUsers.length === 0) {
                    alert('Выберите хотя бы одного участника');
                    return;
                }

                const roomUrl = window.location.href;
                const roomName = "{{ room_name }}";
                const socket = window.private_socket;

                if (socket && socket.readyState === WebSocket.OPEN) {
                    selectedUsers.forEach(userId => {
                        const payload = {
                            type: "private_message",
                            to: userId,
                            message: `Вас приглашают присоединиться к чату: <strong>${roomName}</strong>. <br><a href="${roomUrl}" class="btn btn-xs btn-primary mt-1">Присоединиться</a>`
                        };
                        socket.send(JSON.stringify(payload));
                    });
                    
                    // Показываем уведомление об успехе
                    if (typeof PNotify !== 'undefined') {
                        new PNotify({
                            title: 'Успешно',
                            text: 'Приглашения отправлены',
                            type: 'success',
                            styling: 'bootstrap3'
                        });
                    } else {
                        alert('Приглашения отправлены!');
                    }
                    
                    bootstrap.Modal.getInstance(document.getElementById('inviteModal')).hide();
                    $('#invite-users-select').val(null).trigger('change');
                } else {
                    alert('Ошибка: Соединение для отправки уведомлений не установлено');
                }
            });
        });
    </script>
{% endblock %}
