{% extends "ppequipment_app/base.html" %}
{% block title %}<title>Даты сверок</title>{% endblock %}
{% block page_content %}
<h2>Даты сверок</h2>
<a href="{% url 'ppequipment_app:verification_date_create' %}" class="btn btn-success mb-3">Добавить</a>
<table class="table table-striped table-hover">
    <thead><tr><th>Дата сверки</th><th>Действия</th></tr></thead>
    <tbody>
        {% for obj in object_list %}
        <tr>
            <td>{{ obj.verification_date }}</td>
            <td>
                <a href="{% url 'ppequipment_app:verification_date_update' obj.pk %}" class="btn btn-sm btn-outline-primary">Изменить</a>
                <a href="{% url 'ppequipment_app:verification_date_delete' obj.pk %}" class="btn btn-sm btn-outline-danger">Удалить</a>
            </td>
        </tr>
        {% empty %}
        <tr><td colspan="2" class="text-center">Нет данных</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
