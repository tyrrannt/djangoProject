{% extends "customers_app/main.html" %}
{% load static %}

{% block title %}{{ title }}{% endblock %}

{% block custom_css %}
<style>
    .finance-container { padding: 24px; background-color: #f8fafc; min-height: 100vh; font-family: 'Inter', sans-serif; }
    .table-container { background: #ffffff; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); border: 1px solid #e2e8f0; max-width: 600px; margin: 0 auto; }
    .btn-primary { background-color: #1f497d; color: white; padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; text-decoration: none; }
    .btn-primary:hover { background-color: #15325b; color: white; text-decoration: none; }
    .btn-secondary { background-color: #e2e8f0; color: #475569; padding: 8px 16px; border-radius: 8px; text-decoration: none; }
    .btn-secondary:hover { background-color: #cbd5e1; color: #334155; text-decoration: none; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: #475569; margin-bottom: 4px; }
    .form-control { width: 100%; padding: 8px; border: 1px solid #cbd5e1; border-radius: 6px; }
</style>
{% endblock %}

{% block content %}
<div class="finance-container">
    <div class="table-container">
        <h2 style="font-size: 20px; font-weight: 700; margin-bottom: 20px;">{{ title }}</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div style="display: flex; gap: 12px; margin-top: 24px;">
                <button type="submit" class="btn-primary">Сохранить</button>
                <a href="javascript:history.back()" class="btn-secondary">Отмена</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
